<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vayzip Map</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: #222;
    }

    .app {
      height: 100%;
      display: grid;
      grid-template-columns: 320px 1fr;
    }

    .sidebar {
      background: #f7f7f7;
      border-right: 1px solid #e6e6e6;
      padding: 18px 16px;
      overflow: auto;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 6px;
      letter-spacing: -0.01em;
    }

    .subtitle {
      margin: 0 0 14px;
      color: #666;
      font-size: 13.5px;
      line-height: 1.4;
    }

    .search-wrap {
      margin: 0 0 16px;
    }

    .search-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #666;
      margin: 0 0 6px;
    }

    .search-input {
      width: 100%;
      padding: 12px 14px;
      font-size: 14px;
      border: 1px solid #dcdcdc;
      border-radius: 12px;
      outline: none;
      background: #fff;
      box-sizing: border-box;
    }

    .search-input:focus {
      border-color: #bdbdbd;
    }

    .list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .item {
      margin: 0 0 10px;
    }

    .link {
      display: block;
      padding: 10px 12px;
      border: 1px solid #e6e6e6;
      border-radius: 12px;
      background: #fff;
      text-decoration: none;
      color: #222;
      cursor: pointer;
    }

    .link:hover {
      background: #fcfcfc;
    }

    .name {
      font-weight: 700;
      font-size: 14px;
      margin: 0 0 2px;
    }

    .desc {
      font-size: 12.5px;
      color: #666;
      margin: 0;
      line-height: 1.35;
    }

    #map {
      height: 100%;
      width: 100%;
    }

    .footer {
      margin-top: 14px;
      font-size: 12px;
      color: #888;
      line-height: 1.5;
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: 280px 1fr;
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid #e6e6e6;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1 class="title">Vayzip — Map</h1>
      <p class="subtitle">
        Search for a place, or click one of your saved items below.
      </p>

      <div class="search-wrap">
        <label class="search-label" for="place-search">Search location</label>
        <input
          id="place-search"
          class="search-input"
          type="text"
          placeholder="Try Malibu, Alicante, Lake Garda..."
          autocomplete="off"
        />
      </div>

      <ul id="places" class="list"></ul>

      <div class="footer">
        Search moves the map only.<br />
        No marker is added.
      </div>
    </aside>

    <main id="map" aria-label="Map"></main>
  </div>

  <script>
    const PLACES = [
      {
        name: "Aalborg",
        desc: "Example saved place.",
        lat: 57.0488,
        lng: 9.9217,
        zoom: 12
      },
      {
        name: "Copenhagen",
        desc: "Another example saved place.",
        lat: 55.6761,
        lng: 12.5683,
        zoom: 12
      },
      {
        name: "Los Angeles",
        desc: "Useful for testing southern California areas.",
        lat: 34.0522,
        lng: -118.2437,
        zoom: 10
      }
    ];

    let map;

    function renderSidebar() {
      const ul = document.getElementById("places");
      ul.innerHTML = "";

      PLACES.forEach((p) => {
        const li = document.createElement("li");
        li.className = "item";

        const a = document.createElement("a");
        a.className = "link";
        a.href = "#";
        a.addEventListener("click", (e) => {
          e.preventDefault();
          goToCoords(p.lat, p.lng, p.zoom || 12);
        });

        const name = document.createElement("div");
        name.className = "name";
        name.textContent = p.name;

        const desc = document.createElement("p");
        desc.className = "desc";
        desc.textContent = p.desc || "";

        a.appendChild(name);
        a.appendChild(desc);
        li.appendChild(a);
        ul.appendChild(li);
      });
    }

    function goToCoords(lat, lng, zoom) {
      if (!map) return;
      map.panTo({ lat, lng });
      if (zoom) map.setZoom(zoom);
    }

    function setupAutocomplete() {
      const input = document.getElementById("place-search");

      const autocomplete = new google.maps.places.Autocomplete(input, {
        fields: ["geometry", "name"],
      });

      autocomplete.addListener("place_changed", () => {
        const place = autocomplete.getPlace();

        if (!place || !place.geometry) {
          return;
        }

        if (place.geometry.viewport) {
          map.fitBounds(place.geometry.viewport);
        } else if (place.geometry.location) {
          map.panTo(place.geometry.location);
          map.setZoom(12);
        }
      });
    }

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: PLACES[0].lat, lng: PLACES[0].lng },
        zoom: PLACES[0].zoom || 12,
        mapTypeControl: false,
        streetViewControl: false,
        fullscreenControl: true,
        clickableIcons: false
      });

      renderSidebar();
      setupAutocomplete();
    }

    window.initMap = initMap;
  </script>

  <!-- Replace with your real API key -->
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDF8sAJtCxxefueYyx8c8w8zCbo5oYzrc8&callback=initMap"
    async
    defer
  ></script>
</body>
</html>
