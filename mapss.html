<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vayzip Map</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: #222;
    }

    .app {
      height: 100%;
      display: grid;
      grid-template-columns: 320px 1fr;
    }

    .sidebar {
      background: #f7f7f7;
      border-right: 1px solid #e6e6e6;
      padding: 18px 16px;
      overflow: auto;
      display: flex;
      flex-direction: column;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 6px;
      letter-spacing: -0.01em;
    }

    .subtitle {
      margin: 0 0 14px;
      color: #666;
      font-size: 13.5px;
      line-height: 1.4;
    }

    .search-wrap {
      margin: 0 0 16px;
    }

    .search-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #666;
      margin: 0 0 6px;
    }

    .search-input {
      width: 100%;
      padding: 12px 14px;
      font-size: 14px;
      border: 1px solid #dcdcdc;
      border-radius: 12px;
      outline: none;
      background: #fff;
      box-sizing: border-box;
    }

    .search-input:focus {
      border-color: #bdbdbd;
    }

    .error {
      display: none;
      margin-top: 8px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #fff3f3;
      border: 1px solid #f0caca;
      color: #a33;
      font-size: 12.5px;
      line-height: 1.4;
    }

    #map {
      height: 100%;
      width: 100%;
    }

    .footer {
      margin-top: auto;
      font-size: 12px;
      color: #888;
      line-height: 1.5;
      padding-top: 20px;
      border-top: 1px solid #e6e6e6;
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: 280px 1fr;
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid #e6e6e6;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">

      <div>
        <h1 class="title">Vayzip — Map</h1>
        <p class="subtitle">
          Search for a place, or jump back to somewhere you've searched before.
        </p>

        <div class="search-wrap">
          <label class="search-label" for="place-search">Search location</label>
          <input
            id="place-search"
            class="search-input"
            type="text"
            placeholder="Try Malibu, Alicante, Lake Garda..."
            autocomplete="off"
          />
          <div id="search-error" class="error">
            Search is unavailable. Make sure the Places API is enabled for this key.
          </div>
        </div>

        <select id="recent-searches" class="search-input" style="margin-top:8px; display:none;">
          <option value="">Recent locations</option>
        </select>
        
      </div>

      <div class="footer">
        Built by someone with 20+ years in online travel and vacation rentals – obsessed with making search stupidly fast. No waiting around.
      </div>

    </aside>

    <main id="map" aria-label="Map"></main>
  </div>

  <script>
    let map;

    const RECENT_SEARCHES_KEY = "vayzip_recent_locations";
    const MAX_RECENT_SEARCHES = 10;

    function getRecentSearches() {
      try {
        const raw = localStorage.getItem(RECENT_SEARCHES_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch (err) {
        return [];
      }
    }

    function saveRecentSearches(items) {
      localStorage.setItem(RECENT_SEARCHES_KEY, JSON.stringify(items));
    }

    function addRecentSearch(place) {
      if (!place || !place.name || !place.geometry || !place.geometry.location) return;

      const lat = place.geometry.location.lat();
      const lng = place.geometry.location.lng();

      const item = {
        name: place.name,
        lat: lat,
        lng: lng
      };

      let items = getRecentSearches();

      items = items.filter((x) => x.name !== item.name);

      items.unshift(item);

      if (items.length > MAX_RECENT_SEARCHES) {
        items = items.slice(0, MAX_RECENT_SEARCHES);
      }

      saveRecentSearches(items);
      renderRecentSearches();
    }

    function renderRecentSearches() {
      const select = document.getElementById("recent-searches");
      const items = getRecentSearches();
    
      select.innerHTML = '<option value="">Recent locations</option>';
    
      if (!items.length) {
        select.style.display = "none";
        return;
      }
    
      items.forEach((item, index) => {
        const option = document.createElement("option");
        option.value = String(index);
        option.textContent = item.name;
        select.appendChild(option);
      });
    
      // Add info line at bottom
      const info = document.createElement("option");
      info.textContent = "— We only keep the latest 10 searches —";
      info.disabled = true;
      select.appendChild(info);
    
      select.style.display = "block";
    }

    function setupRecentSearchesDropdown() {
      const select = document.getElementById("recent-searches");

      select.addEventListener("change", () => {
        const items = getRecentSearches();
        const index = Number(select.value);

        if (Number.isNaN(index) || !items[index]) return;

        const item = items[index];
        map.panTo({ lat: item.lat, lng: item.lng });
        map.setZoom(12);

        select.value = "";
      });
    }

    function showSearchError(message) {
      const el = document.getElementById("search-error");
      el.textContent = message;
      el.style.display = "block";
    }

    function setupAutocomplete() {
      const input = document.getElementById("place-search");

      if (
        !window.google ||
        !google.maps ||
        !google.maps.places ||
        !google.maps.places.Autocomplete
      ) {
        showSearchError("Search is unavailable. Enable Places API and load libraries=places.");
        return;
      }

      const autocomplete = new google.maps.places.Autocomplete(input, {
        fields: ["geometry", "name"]
      });

      autocomplete.bindTo("bounds", map);

      autocomplete.addListener("place_changed", () => {
        const place = autocomplete.getPlace();

        if (!place || !place.geometry) return;

        if (place.geometry.viewport) {
          map.fitBounds(place.geometry.viewport);
        } else if (place.geometry.location) {
          map.panTo(place.geometry.location);
          map.setZoom(12);
        }

        addRecentSearch(place);
        input.value = "";
      });
    }

    function centerMapOnUserLocation() {
      if (!navigator.geolocation) {
        centerUSA();
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (position) => {
          const userLat = position.coords.latitude;
          const userLng = position.coords.longitude;

          map.setCenter({ lat: userLat, lng: userLng });
          map.setZoom(6);
        },
        () => {
          centerUSA();
        },
        {
          enableHighAccuracy: false,
          timeout: 5000,
          maximumAge: 300000
        }
      );
    }

    function centerUSA() {
      map.setCenter({ lat: 39.8283, lng: -98.5795 });
      map.setZoom(4);
    }

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        zoom: 12,
        mapTypeControl: false,
        streetViewControl: false,
        fullscreenControl: true,
        clickableIcons: false
      });

      setupAutocomplete();
      renderRecentSearches();
      setupRecentSearchesDropdown();
      centerMapOnUserLocation();
    }

    window.initMap = initMap;
  </script>

  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDF8sAJtCxxefueYyx8c8w8zCbo5oYzrc8&loading=async&libraries=places&callback=initMap"
    async
    defer
  ></script>
</body>
</html>
